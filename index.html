<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooler Tap</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#050814;
    font-family:Arial;
    overflow:hidden;
}

.fan-wrapper{
    position:relative;
    width:300px;
    height:300px;
    cursor:pointer;
}

.fan{
    width:100%;
    height:100%;
    border-radius:50%;
    background:radial-gradient(circle,#1c2a4a,#050814);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:spin 8s linear infinite;
}

.blades{
    width:220px;
    height:220px;
    border-radius:50%;
    background:
    conic-gradient(
        #0b0f1f 0deg 30deg,
        transparent 30deg 60deg,
        #0b0f1f 60deg 90deg,
        transparent 90deg 120deg,
        #0b0f1f 120deg 150deg,
        transparent 150deg 180deg,
        #0b0f1f 180deg 210deg,
        transparent 210deg 240deg,
        #0b0f1f 240deg 270deg,
        transparent 270deg 300deg,
        #0b0f1f 300deg 330deg,
        transparent 330deg 360deg
    );
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.counter{
    margin-top:40px;
    font-size:70px;
    color:#72ff9f;
    text-shadow:0 0 20px #00ff88;
}
</style>
</head>

<body>

<div class="fan-wrapper" onclick="tap()">
    <div class="fan" id="fan">
        <div class="blades"></div>
    </div>
</div>

<div class="counter" id="counter">0000</div>

<script>
let count = 0;
let speed = 8;

function tap(){
    count++;
    document.getElementById("counter").innerText =
        count.toString().padStart(4,"0");

    speed = 2;
    document.getElementById("fan").style.animationDuration = speed + "s";

    setTimeout(()=>{
        speed = 8;
        document.getElementById("fan").style.animationDuration = speed + "s";
    },300);
}
</script>

</body>
</html>
