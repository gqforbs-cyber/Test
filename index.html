<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooler Tap</title>

<style>
:root{
  --img:url("./A185A1F2-89F8-4539-B7F4-24DB68B30DED.png");

  /* Положение вентилятора (уже подогнано под твой скрин) */
  --fan-x: 52%;
  --fan-y: 56%;
  --fan-r: 22%;

  --speed: 14s;
  --speed-boost: 1s;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#050814;
  font-family:Arial;
  overflow:hidden;
  user-select:none;
}

.stage{
  width:min(92vw, 420px);
  aspect-ratio: 768/1365;
  position:relative;
  transform:rotate(-18deg);
  cursor:pointer;
  touch-action:manipulation;
}

.base{
  position:absolute;
  inset:0;
  background-image:var(--img);
  background-size:cover;
  background-position:center;
  border-radius:18px;
  box-shadow:0 20px 80px rgba(0,0,0,.45);
}

/* Крутится ТОЛЬКО круг вентилятора */
.fanOnly{
  position:absolute;
  inset:0;
  background-image:var(--img);
  background-size:cover;
  background-position:center;

  -webkit-clip-path: circle(var(--fan-r) at var(--fan-x) var(--fan-y));
  clip-path: circle(var(--fan-r) at var(--fan-x) var(--fan-y));

  transform-origin: var(--fan-x) var(--fan-y);
  animation: spin var(--speed) linear infinite;
  pointer-events:none;
}

.stage.boost .fanOnly{
  animation-duration:var(--speed-boost);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* Счетчик */
.counter{
  margin-top:20px;
  font-size:72px;
  font-weight:700;
  letter-spacing:8px;
  color:#4CFF7A;
  text-shadow:0 0 25px rgba(76,255,122,.4);
  font-variant-numeric:tabular-nums;
}
</style>
</head>

<body>

<div id="stage" class="stage">
  <div class="base"></div>
  <div class="fanOnly"></div>
</div>

<div class="counter" id="count">0000</div>

<script>
const stage=document.getElementById("stage");
const counter=document.getElementById("count");

let count=0;
let timeout;

function pad(n){
  return String(n).padStart(4,"0");
}

function tap(){
  count++;
  counter.textContent=pad(count);

  stage.classList.add("boost");
  clearTimeout(timeout);
  timeout=setTimeout(()=>{
    stage.classList.remove("boost");
  },200);
}

stage.addEventListener("click",tap);
stage.addEventListener("touchstart",e=>{
  e.preventDefault();
  tap();
},{passive:false});
</script>

</body>
</html>
