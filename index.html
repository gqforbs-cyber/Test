<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Cooler Tap</title>

  <style>
    :root{
      --bg1:#0b1d44;
      --bg2:#140b3a;
      --card:#27437a66;
      --card2:#0a0f1f55;
      --stroke:#ffffff22;
      --text:#e9f1ff;
      --muted:#b8c7ea99;
      --mint:#7dffb5;
      --btn:#0f1a2a88;
      --btnStroke:#7dffb533;
    }

    /* ✅ 2) убираем выделение/копирование, callout, “лупу” */
    html, body, *{
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    html, body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 900px at 50% 15%, #1c3f87 0%, var(--bg1) 35%, var(--bg2) 100%);
      color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      overflow:hidden; /* чтобы страница не “прыгала” */
      touch-action: manipulation; /* ✅ 3) меньше шансов на зум */
    }

    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
      box-sizing:border-box;
    }

    .panel{
      width:min(420px, 92vw);
      height:min(860px, 92vh);
      border-radius:34px;
      background: linear-gradient(180deg, #3b6bb344 0%, #1a2a5a55 40%, #1a0e3a66 100%);
      border:1px solid var(--stroke);
      box-shadow: 0 30px 80px #00000066;
      position:relative;
      padding:18px 18px 20px;
      box-sizing:border-box;
      overflow:hidden;
    }

    .topRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: #ffffff10;
      font-weight:600;
      letter-spacing:.3px;
      color:#d8e6ff;
    }

    .fanZone{
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .fanOuter{
      width:min(320px, 68vw);
      aspect-ratio:1/1;
      border-radius:50%;
      border:1px solid #ffffff22;
      background: radial-gradient(circle at 50% 45%, #ffffff12 0%, #ffffff05 45%, transparent 70%);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .fanRing{
      position:absolute;
      inset:10%;
      border-radius:50%;
      border:1px solid #ffffff18;
      background: radial-gradient(circle at 50% 50%, #ffffff12 0%, #ffffff07 55%, transparent 72%);
    }

    .fan{
      width:72%;
      aspect-ratio:1/1;
      border-radius:50%;
      position:relative;
      transform: translateZ(0);
      /* скорость управляется JS через CSS переменную */
      animation: spin var(--spinDur, 10s) linear infinite;
      filter: drop-shadow(0 10px 18px #00000040);
    }

    /* лопасти */
    .blade{
      position:absolute;
      left:50%;
      top:50%;
      width:38%;
      height:18%;
      transform-origin: 0% 50%;
      border-radius:999px;
      background: linear-gradient(90deg, #ffffff1f 0%, #ffffff0b 70%, transparent 100%);
      border:1px solid #ffffff14;
      opacity:.85;
    }
    .blade:nth-child(1){ transform: translate(-2%, -50%) rotate(0deg); }
    .blade:nth-child(2){ transform: translate(-2%, -50%) rotate(60deg); }
    .blade:nth-child(3){ transform: translate(-2%, -50%) rotate(120deg); }
    .blade:nth-child(4){ transform: translate(-2%, -50%) rotate(180deg); }
    .blade:nth-child(5){ transform: translate(-2%, -50%) rotate(240deg); }
    .blade:nth-child(6){ transform: translate(-2%, -50%) rotate(300deg); }

    .hub{
      position:absolute;
      left:50%;
      top:50%;
      width:28%;
      height:28%;
      transform: translate(-50%, -50%);
      border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #ffffff2a 0%, #ffffff10 55%, #00000022 100%);
      border:1px solid #ffffff20;
    }
    .hub2{
      position:absolute;
      left:50%;
      top:50%;
      width:14%;
      height:14%;
      transform: translate(-50%, -50%);
      border-radius:50%;
      background: radial-gradient(circle at 40% 40%, #ffffff30 0%, #ffffff10 55%, #00000022 100%);
      border:1px solid #ffffff1f;
    }

    @keyframes spin{
      to{ transform: rotate(360deg); }
    }

    .bottomCard{
      position:absolute;
      left:18px;
      right:18px;
      bottom:20px;
      border-radius:26px;
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, #0b1327aa 0%, #120b33bb 100%);
      padding:18px 18px 16px;
      box-shadow: inset 0 0 0 1px #00000022;
    }

    .score{
      font-size:84px;
      line-height:1;
      font-weight:800;
      letter-spacing:6px;
      text-align:center;
      color:var(--mint);
      text-shadow: 0 0 18px #7dffb540;
      margin:4px 0 10px;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:18px;
      margin-bottom:14px;
    }

    .btn{
      width:100%;
      border-radius:18px;
      padding:16px 16px;
      background: var(--btn);
      border:1px solid var(--btnStroke);
      color:#eaf4ff;
      font-size:26px;
      font-weight:800;
      letter-spacing:.3px;
      cursor:pointer;
      display:block;
    }

    .btn:active{
      transform: translateY(1px);
      filter: brightness(1.05);
    }

    /* ✅ кликаем по зоне вентилятора без “скролла” */
    .tapLayer{
      position:absolute;
      inset:0;
      border-radius:50%;
      z-index:5;
    }

    /* чтобы ничего “случайно” не выделялось */
    .noSelect{
      -webkit-user-select:none;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="wrap noSelect">
    <div class="panel noSelect" id="panel">
      <div class="topRow">
        <div class="pill">Cooler Tap</div>
        <div class="pill">v0.1</div>
      </div>

      <div class="fanZone">
        <div class="fanOuter" id="fanOuter">
          <div class="fanRing"></div>

          <div class="fan" id="fan">
            <div class="blade"></div>
            <div class="blade"></div>
            <div class="blade"></div>
            <div class="blade"></div>
            <div class="blade"></div>
            <div class="blade"></div>
            <div class="hub"></div>
            <div class="hub2"></div>

            <!-- слой для тапа -->
            <div class="tapLayer" id="tapLayer"></div>
          </div>
        </div>
      </div>

      <div class="bottomCard">
        <!-- ✅ 1) по умолчанию 0000 -->
        <div class="score" id="score">0000</div>
        <div class="hint">Тапай по кругу вентилятора ☝️</div>
        <button class="btn" type="button" id="claim">Забрать награды</button>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // ✅ 1) СЧЕТЧИК СТАРТУЕТ С 0
    // =========================
    let taps = 0;

    const scoreEl = document.getElementById('score');
    const tapLayer = document.getElementById('tapLayer');
    const fan = document.getElementById('fan');

    function renderScore(){
      // 4 цифры как на табло (0000, 0010, 0060 и т.д.)
      const s = String(taps).padStart(4, '0');
      scoreEl.textContent = s;
    }
    renderScore(); // всегда старт с 0000

    // =========================
    // ✅ ВРАЩЕНИЕ: 10с за круг, при тапе 1с за круг
    // =========================
    const IDLE_DUR = 10;  // сек
    const TAP_DUR  = 1;   // сек
    const BOOST_MS = 900; // держим ускорение ~1 сек

    let boostTimer = null;

    function setSpin(seconds){
      fan.style.setProperty('--spinDur', seconds + 's');
    }

    // старт: медленно (1 круг / 10 сек)
    setSpin(IDLE_DUR);

    function boostSpin(){
      setSpin(TAP_DUR);

      if (boostTimer) clearTimeout(boostTimer);
      boostTimer = setTimeout(() => {
        // плавно возвращаем обратно
        setSpin(IDLE_DUR);
      }, BOOST_MS);
    }

    // =========================
    // ✅ ТАП: +1 и ускорение
    // =========================
    function onTap(){
      taps += 1;
      renderScore();
      boostSpin();
    }

    // pointer/touch
    tapLayer.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      onTap();
    }, {passive:false});

    // =========================
    // ✅ 2) УБРАТЬ “ВЫДЕЛИТЬ/СКОПИРОВАТЬ”
    // =========================
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('selectstart', (e) => e.preventDefault());

    // =========================
    // ✅ 3) УБРАТЬ ЗУМ/МАСШТАБ (iOS/Telegram WebView)
    // =========================
    // запрет pinch-zoom (iOS)
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    // запрет double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, {passive:false});

    // запрет “двойного клика” как в браузере
    document.addEventListener('dblclick', (e) => e.preventDefault(), {passive:false});

    // кнопка награды пока без логики
    document.getElementById('claim').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Скоро добавим награды 🙂');
    });
  </script>
</body>
</html>
