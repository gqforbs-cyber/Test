<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cooler Tap</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg1:#050812;
      --bg2:#09061a;
      --glow: rgba(80, 170, 255, .22);
      --glow2: rgba(164, 80, 255, .16);
      --text: rgba(230,240,255,.92);
      --muted: rgba(230,240,255,.55);
      --green:#7CFFB0;
      --green2:#36FF86;
      --card: rgba(18, 24, 48, .55);
      --card2: rgba(32, 18, 64, .25);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 900px at 30% 25%, rgba(50,120,255,.22), transparent 60%),
        radial-gradient(1000px 800px at 80% 65%, rgba(150,70,255,.18), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      touch-action: manipulation;
    }

    .card{
      width:min(420px, 92vw);
      height:min(780px, 88vh);
      border-radius:28px;
      padding:18px 18px 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.09);
      box-shadow:
        0 30px 80px rgba(0,0,0,.55),
        0 0 0 1px rgba(0,0,0,.25) inset;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute; inset:-40px;
      background:
        radial-gradient(600px 500px at 25% 20%, var(--glow), transparent 60%),
        radial-gradient(650px 520px at 85% 70%, var(--glow2), transparent 55%);
      filter: blur(12px);
      opacity:.9;
      pointer-events:none;
    }

    .top{
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      z-index:2;
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(230,240,255,.75);
      font-size:14px;
      letter-spacing:.2px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .fanWrap{
      position:relative;
      z-index:2;
      margin: 22px auto 16px;
      width:min(330px, 72vw);
      aspect-ratio: 1 / 1;
      border-radius:50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.08), rgba(255,255,255,.03) 60%, rgba(0,0,0,.15));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 22px 60px rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;

      /* важно: чтобы на iOS не было зума/скролла */
      touch-action: manipulation;
    }

    /* Вентилятор: вращаем ТОЛЬКО лопасти */
    .fanBlades{
      position:absolute; inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.35), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 55%);
      opacity:.9;
      transform-origin: 50% 50%;
      will-change: transform;
      pointer-events:none;
    }

    /* Простые лопасти (векторные клинья через conic-gradient) */
    .fanBlades::before{
      content:"";
      position:absolute; inset:12%;
      border-radius:50%;
      background:
        conic-gradient(
          from 0deg,
          rgba(255,255,255,.18) 0 18deg,
          rgba(255,255,255,0) 18deg 45deg,
          rgba(255,255,255,.14) 45deg 63deg,
          rgba(255,255,255,0) 63deg 90deg,
          rgba(255,255,255,.16) 90deg 108deg,
          rgba(255,255,255,0) 108deg 135deg,
          rgba(255,255,255,.14) 135deg 153deg,
          rgba(255,255,255,0) 153deg 180deg,
          rgba(255,255,255,.18) 180deg 198deg,
          rgba(255,255,255,0) 198deg 225deg,
          rgba(255,255,255,.14) 225deg 243deg,
          rgba(255,255,255,0) 243deg 270deg,
          rgba(255,255,255,.16) 270deg 288deg,
          rgba(255,255,255,0) 288deg 315deg,
          rgba(255,255,255,.14) 315deg 333deg,
          rgba(255,255,255,0) 333deg 360deg
        );
      filter: blur(.2px);
      opacity:.55;
    }

    .hub{
      width:30%;
      height:30%;
      border-radius:50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.12), rgba(0,0,0,.35));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 24px rgba(0,0,0,.35) inset;
      z-index:2;
      pointer-events:none;
    }

    .panel{
      position:relative;
      z-index:2;
      margin: 6px auto 0;
      width:min(360px, 84vw);
      padding:18px 14px 16px;
      border-radius:22px;
      background: linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align:center;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }

    .digits{
      font-weight:800;
      font-size:64px;
      letter-spacing:10px;
      color: var(--green);
      text-shadow: 0 0 18px rgba(54,255,134,.35);
      margin: 2px 0 10px;
      font-variant-numeric: tabular-nums;
    }

    .sub{
      margin: 2px 0 14px;
      color: var(--muted);
      font-size:16px;
      line-height:1.35;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      background: rgba(124,255,176,.14);
      border:1px solid rgba(124,255,176,.35);
      color: rgba(230,255,245,.95);
      font-weight:700;
      font-size:16px;
      cursor:pointer;
      user-select:none;
    }

    .btn:active{ transform: translateY(1px); }

    /* маленький всплеск по тапу */
    .pop{
      position:absolute;
      width:10px; height:10px;
      border-radius:50%;
      background: rgba(124,255,176,.95);
      box-shadow: 0 0 18px rgba(124,255,176,.55);
      transform: translate(-50%,-50%);
      pointer-events:none;
      animation: pop .55s ease-out forwards;
      z-index:5;
    }
    @keyframes pop{
      0%{ opacity:.0; transform: translate(-50%,-50%) scale(.3); }
      15%{ opacity:1; }
      100%{ opacity:0; transform: translate(-50%,-70%) scale(2.6); }
    }

    /* вращение */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning{ animation: spin 1.1s linear infinite; }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="pill">Cooler Tap</div>
      <div class="pill">v0.1</div>
    </div>

    <!-- КЛИК ТОЛЬКО ТУТ (по кругу) -->
    <div class="fanWrap" id="fanWrap" aria-label="Fan">
      <div class="fanBlades spinning" id="fanBlades"></div>
      <div class="hub"></div>
    </div>

    <div class="panel">
      <div class="digits" id="digits">0000</div>
      <div class="sub">Тапай по кругу вентилятора 👆</div>
      <button class="btn" id="claimBtn">Забрать награды</button>
    </div>
  </div>

  <script>
    // Telegram init (не обязательно, но полезно)
    const tg = window.Telegram?.WebApp;
    try { tg?.ready(); tg?.expand(); } catch(e){}

    const fanWrap = document.getElementById('fanWrap');
    const digitsEl = document.getElementById('digits');
    const claimBtn = document.getElementById('claimBtn');

    let taps = 0;
    const pad4 = (n) => String(n).padStart(4, '0');

    function setDigits(){
      digitsEl.textContent = pad4(taps);
    }

    // Создаём всплеск там, где тапнули
    function makePop(clientX, clientY){
      const r = fanWrap.getBoundingClientRect();
      const x = clientX - r.left;
      const y = clientY - r.top;

      const d = document.createElement('div');
      d.className = 'pop';
      d.style.left = x + 'px';
      d.style.top = y + 'px';
      fanWrap.appendChild(d);
      d.addEventListener('animationend', () => d.remove(), { once:true });
    }

    // ТАП ТОЛЬКО ПО КРУГУ: проверка дистанции до центра
    function isInsideCircle(clientX, clientY){
      const r = fanWrap.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top + r.height/2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const radius = Math.min(r.width, r.height)/2;
      return (dx*dx + dy*dy) <= (radius*radius);
    }

    // Защита от “двойного” срабатывания
    let lastTapAt = 0;
    const TAP_DELAY = 70;

    function handleTap(e){
      const now = Date.now();
      if(now - lastTapAt < TAP_DELAY) return;
      lastTapAt = now;

      // pointer event -> берем координаты
      const clientX = e.clientX ?? (e.touches?.[0]?.clientX);
      const clientY = e.clientY ?? (e.touches?.[0]?.clientY);
      if(clientX == null || clientY == null) return;

      if(!isInsideCircle(clientX, clientY)) return; // строгий круг

      taps += 1;
      setDigits();

      makePop(clientX, clientY);

      // лёгкая вибра в Telegram (если доступно)
      try { tg?.HapticFeedback?.impactOccurred('light'); } catch(_){}
    }

    // Вешаем только на круг
    fanWrap.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      handleTap(e);
    }, { passive:false });

    // Кнопка “Забрать награды”
    claimBtn.addEventListener('click', () => {
      // пока просто заглушка: покажем алерт/попап
      try { tg?.HapticFeedback?.notificationOccurred('success'); } catch(_){}
      if (taps <= 0){
        // ничего не набито
        if(tg?.showPopup){
          tg.showPopup({ title:"Награды", message:"Сначала натапай клики 🙂", buttons:[{type:"ok"}] });
        } else {
          alert("Сначала натапай клики 🙂");
        }
        return;
      }

      // Тут позже подключим реальную логику/сервер
      const msg = `Заявка на награду отправлена!\nКлики: ${taps}`;
      if(tg?.showPopup){
        tg.showPopup({ title:"Награды", message: msg, buttons:[{type:"ok"}] });
      } else {
        alert(msg);
      }
    });

    setDigits();
  </script>
</body>
</html>
