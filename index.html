<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cooler Tap</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg1:#050812;
      --bg2:#09061a;
      --glow: rgba(80, 170, 255, .22);
      --glow2: rgba(164, 80, 255, .16);
      --text: rgba(230,240,255,.92);
      --muted: rgba(230,240,255,.55);
      --green:#7CFFB0;
      --green2:#36FF86;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 900px at 30% 25%, rgba(50,120,255,.22), transparent 55%),
        radial-gradient(900px 700px at 75% 75%, rgba(170,60,255,.18), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      overflow:hidden;
    }

    /* мягкие плавающие точки */
    .sparks{ position:fixed; inset:0; pointer-events:none; opacity:.9; }
    .spark{
      position:absolute; width:10px; height:10px; border-radius:999px;
      background: radial-gradient(circle, rgba(120,255,220,.95), rgba(120,255,220,0) 70%);
      animation: floaty 6s ease-in-out infinite;
    }
    .spark.purple{
      background: radial-gradient(circle, rgba(190,120,255,.85), rgba(190,120,255,0) 70%);
    }
    @keyframes floaty{
      0%,100%{ transform: translate3d(0,0,0) scale(1); opacity:.75;}
      50%{ transform: translate3d(0,-18px,0) scale(1.15); opacity:1;}
    }

    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(18px + env(safe-area-inset-top))
        16px
        calc(18px + env(safe-area-inset-bottom))
        16px;
    }

    .card{
      width:min(520px, 92vw);
      height:min(860px, 88vh);
      border-radius:38px;
      background: linear-gradient(180deg, rgba(15,25,55,.70), rgba(8,10,20,.55));
      box-shadow:
        0 30px 80px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 60px var(--glow),
        0 0 90px var(--glow2);
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .card::before{
      content:"";
      position:absolute; inset:-40px;
      background:
        radial-gradient(500px 300px at 30% 15%, rgba(100,190,255,.20), transparent 60%),
        radial-gradient(600px 400px at 75% 85%, rgba(190,120,255,.16), transparent 60%);
      filter: blur(6px);
      opacity:.9;
      pointer-events:none;
    }

    .topLabel{
      position:absolute;
      top: 16px;
      left: 18px;
      right: 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color: rgba(230,240,255,.55);
      font-size: 13px;
      pointer-events:none;
      z-index:2;
    }
    .badge{
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 0 1px rgba(255,255,255,.06) inset;
    }

    .content{
      position:absolute; inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:22px;
      gap:18px;
    }

    .fanStage{
      width:min(360px, 70vw);
      aspect-ratio: 1/1;
      display:grid;
      place-items:center;
      position:relative;
    }

    /* ВЕНТИЛЯТОР — исправленный */
    .fan{
      width:100%;
      height:100%;
      border-radius:999px;
      position:relative;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.07) inset,
        0 24px 60px rgba(0,0,0,.55);

      /* корпус */
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.10), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 50% 50%, rgba(35,70,140,.55), rgba(6,10,20,.35));
      animation: spin 2.4s linear infinite;
      will-change: transform;
    }

    /* лопасти: повторяющиеся сегменты */
    .fan::after{
      content:"";
      position:absolute;
      inset:10%;
      border-radius:999px;
      background:
        /* лопасти */
        repeating-conic-gradient(
          from -12deg,
          rgba(255,255,255,.16) 0 14deg,
          rgba(0,0,0,0) 14deg 36deg
        );
      /* затемнение к центру/краям, чтобы выглядело объемно */
      -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 0 62%, rgba(0,0,0,0) 72%);
      mask-image: radial-gradient(circle, rgba(0,0,0,1) 0 62%, rgba(0,0,0,0) 72%);
      filter: blur(.15px);
      opacity:.95;
    }

    /* ступица (центр) */
    .fan::before{
      content:"";
      position:absolute;
      left:50%; top:50%;
      width:28%;
      height:28%;
      transform: translate(-50%,-50%);
      border-radius:999px;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.28), rgba(255,255,255,0) 45%),
        radial-gradient(circle at 50% 55%, rgba(120,180,255,.20), rgba(0,0,0,0) 55%),
        radial-gradient(circle, rgba(10,16,40,.85), rgba(0,0,0,.55));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08) inset,
        0 10px 30px rgba(0,0,0,.40);
      z-index:2;
    }

    @keyframes spin{
      from{ transform: rotate(0deg); }
      to{ transform: rotate(360deg); }
    }

    .scoreBox{
      width:min(420px, 78vw);
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 10px 16px;
      border-radius:22px;
      background: rgba(0,0,0,.16);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 20px 50px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .scoreBox::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(300px 120px at 50% 0%, rgba(124,255,176,.22), transparent 60%),
        radial-gradient(280px 120px at 50% 100%, rgba(124,255,176,.14), transparent 60%);
      opacity:.8;
      pointer-events:none;
      filter: blur(6px);
    }
    .score{
      font-size: clamp(56px, 10vw, 92px);
      letter-spacing: .12em;
      font-weight: 800;
      color: var(--green);
      text-shadow:
        0 0 12px rgba(124,255,176,.28),
        0 0 26px rgba(54,255,134,.20);
      font-variant-numeric: tabular-nums;
      z-index:1;
    }
    .hint{
      margin-top:6px;
      font-size: 13px;
      color: var(--muted);
      z-index:1;
      text-align:center;
      padding: 0 12px;
    }
  </style>
</head>

<body>
  <div class="sparks" aria-hidden="true">
    <div class="spark" style="left:10%; top:28%; animation-delay:.0s;"></div>
    <div class="spark purple" style="left:78%; top:34%; width:8px;height:8px; animation-delay:.6s;"></div>
    <div class="spark" style="left:22%; top:72%; width:12px;height:12px; animation-delay:1.1s;"></div>
    <div class="spark purple" style="left:66%; top:68%; width:9px;height:9px; animation-delay:1.7s;"></div>
    <div class="spark" style="left:42%; top:18%; width:7px;height:7px; animation-delay:2.1s;"></div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="topLabel">
        <div class="badge">Cooler Tap</div>
        <div class="badge">v0.1</div>
      </div>

      <div class="content">
        <div class="fanStage">
          <div class="fan" id="fan"></div>
        </div>

        <div class="scoreBox">
          <div class="score" id="score">0000</div>
        </div>
        <div class="hint">Тап — позже подключим. Сейчас фиксируем дизайн.</div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.disableVerticalSwipes?.(); }
  </script>
</body>
</html>
