<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini App Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .fan {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #00f7ff 10%, #003b4a 60%);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .score {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div class="fan" onclick="addScore()"></div>

<div class="score">
  Баллы: <span id="score">0</span>
</div>

<script>
  let score = 0;

  function addScore() {
    score++;
    document.getElementById("score").innerText = score;
  }
</script>

</body>
</html>
