<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>Cooler Tap</title>

  <style>
    :root{
      --bg1:#0a245f;
      --bg2:#070f2f;
      --glass: rgba(255,255,255,.08);
      --glass2: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.14);
      --mint: #7CFFB7;
      --mint2:#57f6a1;
      --text: rgba(255,255,255,.85);
      --muted: rgba(255,255,255,.45);
      --shadow: 0 24px 60px rgba(0,0,0,.55);
    }

    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 900px at 50% 20%, #0f3aa0 0%, var(--bg1) 35%, var(--bg2) 100%);
      color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;

      /* ВАЖНО: убираем выделения/лупу/копировать */
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color: transparent;

      /* убираем резиновый зум/скролл */
      overscroll-behavior: none;
    }

    /* ВАЖНО: предотвращаем двойной тап зум */
    body{
      touch-action: manipulation;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px 14px calc(22px + env(safe-area-inset-bottom));
    }

    .card{
      width:min(430px, 94vw);
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      padding: 18px;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-60px;
      background:
        radial-gradient(420px 320px at 20% 10%, rgba(255,255,255,.10), transparent 60%),
        radial-gradient(520px 420px at 90% 40%, rgba(124,255,183,.10), transparent 60%),
        radial-gradient(520px 520px at 50% 95%, rgba(124,255,183,.08), transparent 60%);
      filter: blur(10px);
      pointer-events:none;
    }

    .top{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 6px 4px 14px;
    }

    .pill{
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.78);
      font-weight: 600;
      letter-spacing:.2px;
    }

    .tap-area{
      position:relative;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      padding: 18px 14px 16px;
      overflow:hidden;
    }

    .tap-area::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(520px 420px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(540px 540px at 50% 70%, rgba(0,0,0,.30), transparent 65%);
      pointer-events:none;
    }

    .rings{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.55;
    }
    .ring{
      position:absolute;
      left:50%;
      top:38%;
      transform: translate(-50%, -50%);
      border-radius:50%;
      border: 1px solid rgba(255,255,255,.12);
    }
    .ring.r1{ width: 76%; aspect-ratio:1; }
    .ring.r2{ width: 62%; aspect-ratio:1; opacity:.7; }
    .ring.r3{ width: 48%; aspect-ratio:1; opacity:.55; }
    .ring.r4{ width: 34%; aspect-ratio:1; opacity:.45; }

    /* Кнопка-значок USDT */
    .coin-wrap{
      position:relative;
      display:flex;
      justify-content:center; /* <-- центрируем */
      align-items:center;
      padding-top: 44px;
      padding-bottom: 18px;
      min-height: 340px;
    }

    .coin{
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background: radial-gradient(80px 80px at 35% 30%, rgba(255,255,255,.22), transparent 60%),
                  radial-gradient(120px 120px at 70% 75%, rgba(0,0,0,.35), transparent 60%),
                  linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.25));
      box-shadow: 0 20px 50px rgba(0,0,0,.55);
      position:relative;
      display:grid;
      place-items:center;
      transform: translateZ(0);
      cursor:pointer;

      /* чтоб не выделялось/не зумилось */
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      touch-action: manipulation;
    }

    .coin::after{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border: 1px solid rgba(255,255,255,.10);
      opacity:.55;
      pointer-events:none;
    }

    .coin:active{
      transform: scale(.98);
    }

    .coin-inner{
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(180deg, #21c77c, #0ea25f);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: inset 0 10px 20px rgba(255,255,255,.12),
                  inset 0 -14px 20px rgba(0,0,0,.25);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }

    .coin-inner::before{
      content:"";
      position:absolute;
      inset:-20%;
      background: radial-gradient(120px 90px at 30% 25%, rgba(255,255,255,.24), transparent 60%);
      transform: rotate(-15deg);
      pointer-events:none;
    }

    /* SVG USDT */
    .usdt{
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.30));
    }

    /* Трещины */
    .cracks{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .crack{
      position:absolute;
      inset:0;
      opacity:0;
      transition: opacity .18s ease;
      mix-blend-mode: screen;
    }
    .crack svg{
      width:100%;
      height:100%;
      opacity:.9;
    }
    .crack path{
      stroke: rgba(255,255,255,.75);
      stroke-width: 2.2;
      fill:none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.45));
    }

    /* Осколки при финале */
    .shards{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
    }
    .shard{
      position:absolute;
      left:50%;
      top:50%;
      width: 18px;
      height: 10px;
      border-radius: 3px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.22);
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.45));
      transform: translate(-50%, -50%) rotate(0deg);
      opacity:0;
    }

    .broken .shards{
      opacity:1;
    }
    .broken .shard{
      animation: fly .55s ease-out forwards;
    }
    @keyframes fly{
      0%{ transform: translate(-50%, -50%) rotate(var(--r)) scale(.9); opacity:0; }
      12%{ opacity:1; }
      100%{ transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) rotate(calc(var(--r) * 1.6)) scale(.95); opacity:0; }
    }

    /* Панель счётчика */
    .panel{
      position:relative;
      margin-top: 6px;
      border-radius: 26px;
      padding: 22px 16px 16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .score{
      font-size: 96px;
      line-height: 1;
      letter-spacing: 4px;
      text-align:center;
      color: var(--mint);
      font-weight: 800;
      text-shadow: 0 16px 30px rgba(0,0,0,.55);
      font-variant-numeric: tabular-nums;
    }

    .hint{
      margin-top: 10px;
      text-align:center;
      color: rgba(255,255,255,.40);
      font-size: 22px;
      font-weight: 500;
    }
    .hint b{
      color: rgba(255,255,255,.65);
      font-weight: 700;
    }

    .btn{
      margin-top: 16px;
      width:100%;
      border-radius: 20px;
      padding: 18px 16px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(124,255,183,.35);
      color: rgba(255,255,255,.88);
      font-weight: 800;
      font-size: 34px;
      text-align:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    /* Запрет выделения текста внутри */
    .no-select, .no-select *{
      -webkit-user-select:none !important;
      user-select:none !important;
      -webkit-touch-callout:none !important;
    }
  </style>
</head>

<body class="no-select">
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="pill">Cooler Tap</div>
        <div class="pill">v0.1</div>
      </div>

      <div class="tap-area">
        <div class="rings">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>
          <div class="ring r4"></div>
        </div>

        <div class="coin-wrap">
          <div id="coin" class="coin" aria-label="USDT">
            <div class="coin-inner">
              <!-- НОРМАЛЬНЫЙ значок USDT -->
              <svg class="usdt" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <g fill="#ffffff">
                  <!-- верхняя "Т" -->
                  <path d="M57 58h142v28H145v20c34 2 58 10 58 20s-24 18-58 20v54h-34v-54c-34-2-58-10-58-20s24-18 58-20V86H57V58z"/>
                  <!-- эллипс -->
                  <path d="M128 122c-46 0-83-9-83-20s37-20 83-20 83 9 83 20-37 20-83 20zm0-12c31 0 56-5 56-8s-25-8-56-8-56 5-56 8 25 8 56 8z"/>
                </g>
              </svg>

              <!-- Трещины -->
              <div class="cracks">
                <!-- 10 тапов: 1 трещина -->
                <div id="crack1" class="crack">
                  <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M62 18 L52 36 L66 44 L54 60 L72 72 L60 92" />
                  </svg>
                </div>

                <!-- 20 тапов: ещё 3 трещины -->
                <div id="crack2" class="crack">
                  <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M28 30 L42 40 L36 54 L48 64 L40 84" />
                  </svg>
                </div>
                <div id="crack3" class="crack">
                  <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M84 32 L70 44 L78 58 L64 70 L72 88" />
                  </svg>
                </div>
                <div id="crack4" class="crack">
                  <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M54 20 L56 34 L44 46 L58 54 L50 74 L58 92" />
                  </svg>
                </div>
              </div>

              <!-- Осколки -->
              <div class="shards" id="shards">
                <div class="shard" style="--x:-80px;--y:-40px;--r:-25deg;"></div>
                <div class="shard" style="--x:90px;--y:-30px;--r:40deg;"></div>
                <div class="shard" style="--x:-70px;--y:65px;--r:15deg;"></div>
                <div class="shard" style="--x:75px;--y:75px;--r:-10deg;"></div>
                <div class="shard" style="--x:0px;--y:-95px;--r:5deg;"></div>
                <div class="shard" style="--x:0px;--y:105px;--r:-35deg;"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div id="score" class="score">0000</div>
          <div id="hint" class="hint">Тапай по значку <b>USDT</b> ☝️</div>
          <div class="btn">Забрать награды</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Запрет жестов iOS (пинч/зум)
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    // Убираем контекстное меню (долгое нажатие)
    window.addEventListener('contextmenu', (e) => e.preventDefault(), { passive: false });

    // Убираем "двойной тап -> зум" максимально
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    const coin = document.getElementById('coin');
    const scoreEl = document.getElementById('score');
    const hintEl = document.getElementById('hint');

    const crack1 = document.getElementById('crack1');
    const crack2 = document.getElementById('crack2');
    const crack3 = document.getElementById('crack3');
    const crack4 = document.getElementById('crack4');

    let taps = 0;
    let broken = false;

    function pad4(n){
      return String(n).padStart(4,'0');
    }

    function haptic(ms=10){
      // На iOS Safari вибрации нет, но на некоторых Android/Telegram работает
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function pressAnim(){
      coin.animate(
        [
          { transform: 'translateZ(0) scale(1)' },
          { transform: 'translateZ(0) scale(0.97)' },
          { transform: 'translateZ(0) scale(1)' }
        ],
        { duration: 130, easing: 'ease-out' }
      );
    }

    function updateCracks(){
      // 10 тапов -> 1 трещина
      crack1.style.opacity = (taps >= 10 && !broken) ? '1' : '0';

      // 20 тапов -> ещё 3 трещины
      const on20 = (taps >= 20 && !broken) ? '1' : '0';
      crack2.style.opacity = on20;
      crack3.style.opacity = on20;
      crack4.style.opacity = on20;
    }

    function breakCoin(){
      broken = true;
      coin.classList.add('broken');
      // показать "50" на табло
      scoreEl.textContent = pad4(50);
      hintEl.textContent = 'Награда: 50 USDT ✅';
      // чуть сильнее вибро
      haptic(30);

      // после анимации осколков можно зафиксировать вид (или оставить как есть)
      setTimeout(() => {
        // Оставляем трещины как часть эффекта "разбился"
        crack1.style.opacity = '1';
        crack2.style.opacity = '1';
        crack3.style.opacity = '1';
        crack4.style.opacity = '1';
      }, 200);
    }

    function handleTap(e){
      e.preventDefault();
      e.stopPropagation();

      if (broken) return;

      taps += 1;
      // Счётчик показывает каждый клик
      scoreEl.textContent = pad4(taps);

      // легкая вибрация на каждый тап
      haptic(10);

      // анимация "нажатия"
      pressAnim();

      updateCracks();

      // 30 тапов => разбить и показать 50
      if (taps >= 30){
        breakCoin();
      }
    }

    // Только тап по значку
    coin.addEventListener('click', handleTap, { passive: false });
    coin.addEventListener('touchstart', handleTap, { passive: false });

    // Старт всегда с нулей (важно!)
    scoreEl.textContent = pad4(0);
  </script>
</body>
</html>
