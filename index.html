<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cooler Tap</title>

<style>
:root{
  --card-tilt:-18deg;

  --fan-size:44%;
  --fan-top:34%;
  --fan-left:28%;

  --disp-top:58.2%;
  --disp-left:16.5%;
  --disp-w:67%;
  --disp-h:10.5%;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050814;
  font-family:Arial;
  overflow:hidden;
  user-select:none;
  touch-action:manipulation;
}

/* === КАРТОЧКА === */
.stage{
  width:min(92vw,420px);
  aspect-ratio:768/1365;
  position:relative;
  transform:rotate(var(--card-tilt));
  cursor:pointer;
}

/* ФОН */
.base{
  position:absolute;
  inset:0;
}
.base img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 20px 90px rgba(0,0,0,.45);
  display:block;
}

/* === НЕОНОВОЕ ПУЛЬСИРОВАНИЕ === */
.stage::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:radial-gradient(circle at 30% 40%, rgba(0,255,255,.15), transparent 60%),
             radial-gradient(circle at 70% 60%, rgba(255,0,255,.15), transparent 60%);
  animation:glowPulse 3s infinite ease-in-out;
  pointer-events:none;
}

@keyframes glowPulse{
  0%{opacity:.4}
  50%{opacity:1}
  100%{opacity:.4}
}

/* === МИГАЮЩИЕ ЛАМПОЧКИ === */
.spark{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#00ffff;
  box-shadow:0 0 12px #00ffff;
  animation:blink 2s infinite ease-in-out;
}

.spark:nth-child(1){top:20%;left:15%;animation-delay:0s;}
.spark:nth-child(2){top:40%;left:80%;animation-delay:0.5s;}
.spark:nth-child(3){top:70%;left:30%;animation-delay:1s;}
.spark:nth-child(4){top:60%;left:60%;animation-delay:1.5s;}

@keyframes blink{
  0%{opacity:.2;transform:scale(.7);}
  50%{opacity:1;transform:scale(1.4);}
  100%{opacity:.2;transform:scale(.7);}
}

/* === ВЕНТИЛЯТОР === */
.fan{
  position:absolute;
  width:var(--fan-size);
  aspect-ratio:1/1;
  top:var(--fan-top);
  left:var(--fan-left);
  border-radius:50%;
  overflow:hidden;
  transform-origin:center;
  animation:spin 10s linear infinite;
  pointer-events:none;
}
.fan img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.stage.boost .fan{
  animation-duration:0.9s;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* === СЧЕТЧИК === */
.display{
  position:absolute;
  top:var(--disp-top);
  left:var(--disp-left);
  width:var(--disp-w);
  height:var(--disp-h);
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.digits{
  font-size:clamp(28px,7vw,52px);
  font-weight:700;
  letter-spacing:6px;
  color:#7CFF9B;
  text-shadow:
    0 0 10px rgba(124,255,155,.35),
    0 0 24px rgba(124,255,155,.25);
  font-variant-numeric:tabular-nums;
}
</style>
</head>

<body>

<div id="stage" class="stage">

  <div class="base">
    <img src="./A185A1F2-89F8-4539-B7F4-24DB68B30DED.png">
  </div>

  <!-- МИГАЮЩИЕ ТОЧКИ -->
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>

  <!-- ВЕНТИЛЯТОР -->
  <div class="fan">
    <img src="./fan.png">
  </div>

  <!-- ТАБЛО -->
  <div class="display">
    <div id="count" class="digits">0000</div>
  </div>

</div>

<script>
const stage=document.getElementById('stage');
const countEl=document.getElementById('count');

let count=0;
let t;

const pad4=n=>String(n).padStart(4,'0');

function tap(){
  count++;
  countEl.textContent=pad4(count);

  stage.classList.add('boost');
  clearTimeout(t);
  t=setTimeout(()=>stage.classList.remove('boost'),160);
}

stage.addEventListener('click',tap);
stage.addEventListener('touchstart',e=>{
  e.preventDefault();
  tap();
},{passive:false});
</script>

</body>
</html>
