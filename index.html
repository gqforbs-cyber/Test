<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Tether Tap</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="screen" id="app">
    <div class="title">Tether Tap</div>

    <section class="tap-area" aria-label="Tap area">
      <button id="coinBtn" class="coin-wrap" aria-label="Tap coin">
        <div id="coin" class="coin coin-stage-0"></div>
      </button>

      <div class="counter" id="counter">0000</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
