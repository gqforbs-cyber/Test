<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cooler Tap</title>
  <style>
    :root{
      --bg1:#0a1633;
      --bg2:#120a2a;
      --glass: rgba(255,255,255,.08);
      --glass2: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.55);
      --accent: #76ffb5;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; margin:0; }
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 30% 10%, #1b3b78 0%, var(--bg1) 40%, var(--bg2) 100%);
      color: var(--text);
      overflow:hidden;
    }

    /* Важно для Telegram iOS: иногда прячет контент пока не перерисуется */
    .app{
      height: 100svh;
      padding: 20px 16px calc(18px + env(safe-area-inset-bottom));
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width:min(420px, 92vw);
      height:min(780px, 92svh);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid var(--stroke);
      box-shadow: 0 22px 60px rgba(0,0,0,.45);
      position: relative;
      overflow:hidden;
      padding: 18px 18px 16px;
    }

    .toprow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom: 14px;
    }
    .pill{
      padding:10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.78);
      font-weight: 600;
      letter-spacing:.2px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .fanWrap{
      margin-top: 10px;
      display:flex;
      justify-content:center;
      align-items:center;
      width: 100%;
      height: 360px;
      position: relative;
      user-select:none;
      touch-action: manipulation;
    }

    /* Круг клика/тапа */
    .tapZone{
      width: 310px;
      height: 310px;
      border-radius: 50%;
      position:absolute;
      inset: 0;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Вентилятор (рисуем CSS-ом, без картинок) */
    .fan{
      width: 310px;
      height: 310px;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.0) 0%,
          rgba(0,0,0,.0) 34%,
          rgba(255,255,255,.05) 35%,
          rgba(255,255,255,.03) 68%,
          rgba(255,255,255,.08) 100%);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.15);
      transform: rotate(0deg);
      will-change: transform;
    }
    .hub{
      width: 92px;
      height: 92px;
      border-radius: 50%;
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.22), rgba(255,255,255,.06) 60%, rgba(0,0,0,.25) 100%);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 26px rgba(0,0,0,.35), inset 0 0 22px rgba(0,0,0,.25);
      z-index: 3;
    }
    .blades{
      position:absolute;
      inset: 22px;
      border-radius: 50%;
      z-index:2;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
    }
    .blade{
      position:absolute;
      left:50%;
      top:50%;
      width: 120px;
      height: 54px;
      transform-origin: 0% 50%;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 18px rgba(0,0,0,.18);
    }
    /* 8 лопастей */
    .blade:nth-child(1){ transform: translate(0,-50%) rotate(0deg); }
    .blade:nth-child(2){ transform: translate(0,-50%) rotate(45deg); }
    .blade:nth-child(3){ transform: translate(0,-50%) rotate(90deg); }
    .blade:nth-child(4){ transform: translate(0,-50%) rotate(135deg); }
    .blade:nth-child(5){ transform: translate(0,-50%) rotate(180deg); }
    .blade:nth-child(6){ transform: translate(0,-50%) rotate(225deg); }
    .blade:nth-child(7){ transform: translate(0,-50%) rotate(270deg); }
    .blade:nth-child(8){ transform: translate(0,-50%) rotate(315deg); }

    .bottom{
      position:absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      padding: 18px 16px 16px;
      border-radius: 26px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .score{
      font-size: 86px;
      text-align:center;
      font-weight: 900;
      letter-spacing: 10px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(118,255,181,.28);
      margin: 6px 0 6px;
    }
    .hint{
      text-align:center;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 14px;
    }

    .btn{
      width: 100%;
      padding: 18px 18px;
      border-radius: 18px;
      border: 1px solid rgba(118,255,181,.35);
      background: rgba(118,255,181,.08);
      color: rgba(255,255,255,.92);
      font-weight: 800;
      font-size: 22px;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
    }
    .btn:active{
      transform: translateY(1px);
      background: rgba(118,255,181,.12);
    }

    .note{
      position:absolute;
      left: 18px;
      right: 18px;
      top: 92px;
      color: rgba(255,255,255,.25);
      font-weight: 700;
      text-align:center;
      pointer-events:none;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">
      <div class="toprow">
        <div class="pill">Cooler Tap</div>
        <div class="pill">v0.1</div>
      </div>

      <div class="fanWrap">
        <div class="tapZone" id="tapZone" aria-label="tap zone">
          <div class="fan" id="fan">
            <div class="blades">
              <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
              <div class="blade"></div><div class="blade"></div><div class="blade"></div><div class="blade"></div>
            </div>
            <div class="hub"></div>
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="score" id="score">0000</div>
        <div class="hint">Тапай по кругу вентилятора ☝️</div>
        <button class="btn" id="claimBtn">Забрать награды</button>
      </div>
    </div>
  </div>

  <script>
    // ========= ВРАЩЕНИЕ: медленно 1 круг/10с, при удержании 1 круг/1с =========
    const fan = document.getElementById("fan");
    const tapZone = document.getElementById("tapZone");
    const scoreEl = document.getElementById("score");
    const claimBtn = document.getElementById("claimBtn");

    // 1 оборот за 10 секунд => 360/10 = 36 град/с
    const slowSpeed = 36;
    // 1 оборот за 1 секунду => 360 град/с
    const fastSpeed = 360;

    let currentSpeed = slowSpeed;
    let targetSpeed  = slowSpeed;

    let angle = 0;
    let lastTime = null;

    function animate(t){
      if (lastTime === null) lastTime = t;
      const dt = (t - lastTime) / 1000;
      lastTime = t;

      // плавное приближение к целевой скорости
      currentSpeed += (targetSpeed - currentSpeed) * 0.10;

      angle += currentSpeed * dt;
      fan.style.transform = `rotate(${angle}deg)`;

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ========= ТАПЫ =========
    let taps = 10; // чтобы не было пусто как на скрине; можешь поставить 0

    function renderScore(){
      scoreEl.textContent = String(taps).padStart(4, "0");
    }
    renderScore();

    // Попадание "по кругу" вентилятора (не по всему экрану)
    function isInsideCircle(e){
      const rect = tapZone.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;

      const x = (e.clientX ?? (e.touches && e.touches[0].clientX));
      const y = (e.clientY ?? (e.touches && e.touches[0].clientY));
      if (x == null || y == null) return false;

      const dx = x - cx;
      const dy = y - cy;

      const r = rect.width/2;
      return (dx*dx + dy*dy) <= (r*r);
    }

    // При удержании/тапе ускоряем, при отпускании возвращаем медленно
    function boostOn(){
      targetSpeed = fastSpeed;
    }
    function boostOff(){
      targetSpeed = slowSpeed;
    }

    // pointer события лучше всего для iOS/Android
    tapZone.addEventListener("pointerdown", (e) => {
      if (!isInsideCircle(e)) return;
      e.preventDefault();
      boostOn();

      // один тап = +1
      taps += 1;
      renderScore();
    }, { passive:false });

    // если пользователь держит и водит пальцем по кругу — тоже можно считать тапами по желанию
    // (сейчас НЕ считаем, только по pointerdown)

    window.addEventListener("pointerup", () => boostOff());

    // safety: если палец ушел с экрана/вкладка свернулась
    window.addEventListener("blur", () => boostOff());
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) boostOff();
    });

    // Кнопка (пока просто заглушка)
    claimBtn.addEventListener("click", () => {
      alert("Награды скоро будут 😉");
    });

    // Лёгкий фикс для Telegram iOS: принудительная перерисовка после загрузки
    // (иногда без этого элементы появляются только после "обновить")
    window.addEventListener("load", () => {
      requestAnimationFrame(() => {
        document.body.style.transform = "translateZ(0)";
        setTimeout(() => (document.body.style.transform = ""), 50);
      });
    });
  </script>
</body>
</html>
