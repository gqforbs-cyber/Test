<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cooler Tap</title>

<style>
:root{
  /* === ТВОЙ ФАЙЛ КАРТИНКИ (замени!) === */
  --img: url("./IMAGE_FILE");

  /* === НАСТРОЙКА КУЛЕРА (подгонка) ===
     Центр круга (cx, cy) и радиус (r) в процентах от всей картинки.
     Их можно чуть подкрутить, если надо.
  */
  --fan-cx: 43%;
  --fan-cy: 46%;
  --fan-r: 22%;

  /* === ЗОНА ТАБЛО (подгонка) === */
  --disp-top: 62%;
  --disp-left: 18%;
  --disp-w: 64%;
  --disp-h: 10%;

  /* скорости */
  --spin-slow: 10s;
  --spin-fast: 0.9s;
}

*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050814;
  font-family:Arial, sans-serif;
  overflow:hidden;
  user-select:none;
  touch-action:manipulation;
}

/* Карточка без перекоса — ровно */
.stage{
  width:min(92vw, 420px);
  aspect-ratio:768/1365;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 90px rgba(0,0,0,.45);
}

/* Фон-картинка (НЕ вращается) */
.bg{
  position:absolute;
  inset:0;
  background-image: var(--img);
  background-size:100% 100%;
  background-repeat:no-repeat;
  background-position:center;
}

/* Вырезанный круг кулера, который вращается */
.fanLayer{
  position:absolute;
  inset:0;
  background-image: var(--img);
  background-size:100% 100%;
  background-repeat:no-repeat;
  background-position:center;

  /* вырезаем круг */
  clip-path: circle(var(--fan-r) at var(--fan-cx) var(--fan-cy));

  /* крутим вокруг центра круга */
  transform-origin: var(--fan-cx) var(--fan-cy);
  animation: spin var(--spin-slow) linear infinite;
}

/* ускорение при клике */
.stage.boost .fanLayer{
  animation-duration: var(--spin-fast);
}

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}

/* Табло со счетчиком поверх */
.display{
  position:absolute;
  top: var(--disp-top);
  left: var(--disp-left);
  width: var(--disp-w);
  height: var(--disp-h);
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.digits{
  font-size: clamp(28px, 8vw, 58px);
  font-weight: 800;
  letter-spacing: 6px;
  color:#7CFF9B;
  text-shadow:
    0 0 10px rgba(124,255,155,.35),
    0 0 24px rgba(124,255,155,.25);
  font-variant-numeric: tabular-nums;
}

/* Немного “жизни”: мягкие неоновые пульсации сверху */
.stage::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,255,.18), transparent 55%),
    radial-gradient(circle at 80% 65%, rgba(255,0,255,.16), transparent 55%);
  animation: glowPulse 3s ease-in-out infinite;
  pointer-events:none;
}

@keyframes glowPulse{
  0%{opacity:.35}
  50%{opacity:1}
  100%{opacity:.35}
}

/* LED точки */
.spark{
  position:absolute;
  width:6px;height:6px;border-radius:50%;
  background:#00ffff;
  box-shadow:0 0 12px #00ffff;
  opacity:.2;
  animation: blink 2s infinite ease-in-out;
  pointer-events:none;
}
.spark.s1{top:22%;left:14%;animation-delay:0s}
.spark.s2{top:40%;left:82%;animation-delay:.5s;background:#ff4dff;box-shadow:0 0 12px #ff4dff}
.spark.s3{top:72%;left:28%;animation-delay:1s}
.spark.s4{top:64%;left:64%;animation-delay:1.5s;background:#7cff9b;box-shadow:0 0 12px #7cff9b}

@keyframes blink{
  0%{opacity:.2;transform:scale(.7)}
  50%{opacity:1;transform:scale(1.4)}
  100%{opacity:.2;transform:scale(.7)}
}

/* Клик по всей карточке */
.clickLayer{
  position:absolute;
  inset:0;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="stage" class="stage">
  <div class="bg"></div>
  <div class="fanLayer"></div>

  <div class="spark s1"></div>
  <div class="spark s2"></div>
  <div class="spark s3"></div>
  <div class="spark s4"></div>

  <div class="display"><div id="count" class="digits">0000</div></div>

  <div class="clickLayer" id="tap"></div>
</div>

<script>
const stage = document.getElementById("stage");
const tap = document.getElementById("tap");
const countEl = document.getElementById("count");

let count = 0;
let t;

const pad4 = n => String(n).padStart(4, "0");

function doTap(){
  count++;
  countEl.textContent = pad4(count);

  stage.classList.add("boost");
  clearTimeout(t);
  t = setTimeout(()=>stage.classList.remove("boost"), 160);
}

tap.addEventListener("click", doTap);
tap.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  doTap();
}, {passive:false});
</script>

</body>
</html>
