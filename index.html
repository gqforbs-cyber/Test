<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tether Tap</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app" id="app">
    <h1 class="title">Tether Tap</h1>

    <!-- Зона тапа -->
    <button class="tap-area" id="tapArea" aria-label="Tap USDT">
      <div class="marble-plate">
        <img
          id="coinImg"
          class="coin"
          src="992437D4-0702-498F-9094-DB45594481F4.png"
          alt="USDT"
          draggable="false"
        />

        <!-- Трещины (рисуем CSS-линиями, без картинок) -->
        <div class="cracks" id="cracks">
          <span class="crack c1"></span>
          <span class="crack c2"></span>
          <span class="crack c3"></span>
          <span class="crack c4"></span>
        </div>

        <!-- Эффект "раскол" -->
        <div class="shatter" id="shatter">
          <span class="shard s1"></span>
          <span class="shard s2"></span>
          <span class="shard s3"></span>
          <span class="shard s4"></span>
        </div>
      </div>
    </button>

    <!-- Табло -->
    <div class="counter-wrap">
      <div class="counter" id="counter">0000</div>
      <div class="reward" id="reward">+50 USDT</div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
