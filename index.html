<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Clicker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Скрипт Телеграма для работы вибрации и кнопок -->
    <script src="https://telegram.org"></script>
</head>
<body>
    <!-- Задний фон с кодом -->
    <div class="crypto-bg">
        <div class="code-overlay" id="codeOverlay"></div>
    </div>

    <div class="app">
        <div class="counter-section">
            <h1 id="score">0</h1>
            <p>USDT COLLECTED</p>
        </div>

        <div class="click-section">
            <button id="tapBtn" class="tether-button"></button>
        </div>
    </div>

    <!-- Звук клика (можно заменить ссылку на свой .mp3) -->
    <audio id="clickSound" src="https://www.soundjay.com" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
