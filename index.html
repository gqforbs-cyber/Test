<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooler Tap</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#050814;
  font-family:Arial;
  overflow:hidden;
}

.fan{
  width:340px;
  cursor:pointer;
}

.fan img{
  width:100%;
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.fast{
  animation-duration:1s !important;
}

.score{
  margin-top:20px;
  font-size:40px;
  color:#00ff88;
  font-weight:bold;
  letter-spacing:5px;
}
</style>
</head>

<body>

<div class="fan" onclick="tap()">
  <img id="fanImg" src="A185A1F2-89F8-4539-B7F4-24DB68B30DED.png">
</div>

<div class="score" id="score">0000</div>

<script>
let count = 0;
let fan = document.getElementById("fanImg");

function tap(){
  count++;
  document.getElementById("score").innerText =
      count.toString().padStart(4,'0');

  fan.classList.add("fast");

  setTimeout(()=>{
    fan.classList.remove("fast");
  },500);
}
</script>

</body>
</html>
