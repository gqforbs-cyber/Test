<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Tap Elite</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org"></script>
</head>
<body>
    <!-- Контейнер для мутного крипто-фона -->
    <canvas id="matrixCanvas"></canvas>

    <div class="main-wrapper">
        <div class="header">
            <h1 id="score">0</h1>
            <p>USDT COLLECTED</p>
        </div>

        <div class="tap-container">
            <div id="tapBtn" class="coin">
                <img src="https://cryptologos.cc" alt="USDT">
            </div>
            <!-- Сюда будут вылетать цифры -->
            <div id="particles"></div>
        </div>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
