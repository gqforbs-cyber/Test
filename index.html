<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Cooler Tap</title>

  <style>
    :root{
      --bg1:#0b1d44;
      --bg2:#140b3a;
      --stroke:#ffffff22;
      --text:#e9f1ff;
      --muted:#b8c7ea99;
      --mint:#7dffb5;
      --btn:#0f1a2a88;
      --btnStroke:#7dffb533;
    }

    /* ✅ Убираем выделение/копирование/лупу */
    html, body, *{
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    html, body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 900px at 50% 15%, #1c3f87 0%, var(--bg1) 35%, var(--bg2) 100%);
      color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      overflow:hidden;
      touch-action: manipulation;
    }

    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
      box-sizing:border-box;
    }

    .panel{
      width:min(420px, 92vw);
      height:min(860px, 92vh);
      border-radius:34px;
      background: linear-gradient(180deg, #3b6bb344 0%, #1a2a5a55 40%, #1a0e3a66 100%);
      border:1px solid var(--stroke);
      box-shadow: 0 30px 80px #00000066;
      position:relative;
      padding:18px 18px 20px;
      box-sizing:border-box;
      overflow:hidden;
    }

    .topRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: #ffffff10;
      font-weight:600;
      letter-spacing:.3px;
      color:#d8e6ff;
    }

    .fanZone{
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .fanOuter{
      width:min(340px, 72vw);
      aspect-ratio:1/1;
      border-radius:50%;
      border:1px solid #ffffff22;
      background:
        radial-gradient(circle at 50% 50%, #ffffff14 0%, #ffffff07 42%, transparent 72%),
        radial-gradient(circle at 50% 45%, #00000025 0%, transparent 60%);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .fanRings{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 36%, #ffffff12 36% 36.3%, transparent 36.3% 52%, #ffffff10 52% 52.3%, transparent 52.3% 100%);
      pointer-events:none;
      opacity:.9;
    }

    /* ✅ 16 лопастей через conic-gradient */
    .fan{
      width:78%;
      aspect-ratio:1/1;
      border-radius:50%;
      position:relative;
      transform: translateZ(0);
      will-change: transform;
      animation: spin var(--spinDur, 10s) linear infinite;

      /* Лопасти + “металл” */
      background:
        radial-gradient(circle at 50% 50%, #ffffff18 0%, #ffffff08 38%, transparent 64%),
        radial-gradient(circle at 35% 35%, #ffffff22 0%, transparent 52%),
        conic-gradient(
          from 0deg,
          rgba(255,255,255,.00) 0deg 6deg,
          rgba(255,255,255,.22) 6deg 12deg,
          rgba(255,255,255,.00) 12deg 22.5deg,

          rgba(255,255,255,.00) 22.5deg 28.5deg,
          rgba(255,255,255,.22) 28.5deg 34.5deg,
          rgba(255,255,255,.00) 34.5deg 45deg,

          rgba(255,255,255,.00) 45deg 51deg,
          rgba(255,255,255,.22) 51deg 57deg,
          rgba(255,255,255,.00) 57deg 67.5deg,

          rgba(255,255,255,.00) 67.5deg 73.5deg,
          rgba(255,255,255,.22) 73.5deg 79.5deg,
          rgba(255,255,255,.00) 79.5deg 90deg,

          rgba(255,255,255,.00) 90deg 96deg,
          rgba(255,255,255,.22) 96deg 102deg,
          rgba(255,255,255,.00) 102deg 112.5deg,

          rgba(255,255,255,.00) 112.5deg 118.5deg,
          rgba(255,255,255,.22) 118.5deg 124.5deg,
          rgba(255,255,255,.00) 124.5deg 135deg,

          rgba(255,255,255,.00) 135deg 141deg,
          rgba(255,255,255,.22) 141deg 147deg,
          rgba(255,255,255,.00) 147deg 157.5deg,

          rgba(255,255,255,.00) 157.5deg 163.5deg,
          rgba(255,255,255,.22) 163.5deg 169.5deg,
          rgba(255,255,255,.00) 169.5deg 180deg,

          rgba(255,255,255,.00) 180deg 186deg,
          rgba(255,255,255,.22) 186deg 192deg,
          rgba(255,255,255,.00) 192deg 202.5deg,

          rgba(255,255,255,.00) 202.5deg 208.5deg,
          rgba(255,255,255,.22) 208.5deg 214.5deg,
          rgba(255,255,255,.00) 214.5deg 225deg,

          rgba(255,255,255,.00) 225deg 231deg,
          rgba(255,255,255,.22) 231deg 237deg,
          rgba(255,255,255,.00) 237deg 247.5deg,

          rgba(255,255,255,.00) 247.5deg 253.5deg,
          rgba(255,255,255,.22) 253.5deg 259.5deg,
          rgba(255,255,255,.00) 259.5deg 270deg,

          rgba(255,255,255,.00) 270deg 276deg,
          rgba(255,255,255,.22) 276deg 282deg,
          rgba(255,255,255,.00) 282deg 292.5deg,

          rgba(255,255,255,.00) 292.5deg 298.5deg,
          rgba(255,255,255,.22) 298.5deg 304.5deg,
          rgba(255,255,255,.00) 304.5deg 315deg,

          rgba(255,255,255,.00) 315deg 321deg,
          rgba(255,255,255,.22) 321deg 327deg,
          rgba(255,255,255,.00) 327deg 337.5deg,

          rgba(255,255,255,.00) 337.5deg 343.5deg,
          rgba(255,255,255,.22) 343.5deg 349.5deg,
          rgba(255,255,255,.00) 349.5deg 360deg
        );

      filter:
        drop-shadow(0 14px 26px #00000055)
        contrast(1.08);
      opacity:1;
    }

    .fan::after{
      /* лёгкий “стеклянный” блик поверх лопастей */
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background: radial-gradient(circle at 35% 30%, #ffffff18 0%, transparent 45%);
      pointer-events:none;
      mix-blend-mode: screen;
      opacity:.9;
    }

    .hub{
      position:absolute;
      left:50%;
      top:50%;
      width:28%;
      height:28%;
      transform: translate(-50%, -50%);
      border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #ffffff2a 0%, #ffffff10 55%, #00000022 100%);
      border:1px solid #ffffff22;
      box-shadow: inset 0 0 0 1px #00000020;
      pointer-events:none;
    }

    .hub2{
      position:absolute;
      left:50%;
      top:50%;
      width:12%;
      height:12%;
      transform: translate(-50%, -50%);
      border-radius:50%;
      background: radial-gradient(circle at 40% 40%, #ffffff30 0%, #ffffff10 55%, #00000022 100%);
      border:1px solid #ffffff1f;
      pointer-events:none;
    }

    @keyframes spin{
      to{ transform: rotate(360deg); }
    }

    .tapLayer{
      position:absolute;
      inset:0;
      border-radius:50%;
      z-index:5;
      background: transparent;
    }

    .bottomCard{
      position:absolute;
      left:18px;
      right:18px;
      bottom:20px;
      border-radius:26px;
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, #0b1327aa 0%, #120b33bb 100%);
      padding:18px 18px 16px;
      box-shadow: inset 0 0 0 1px #00000022;
    }

    .score{
      font-size:84px;
      line-height:1;
      font-weight:800;
      letter-spacing:6px;
      text-align:center;
      color:var(--mint);
      text-shadow: 0 0 18px #7dffb540;
      margin:4px 0 10px;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:18px;
      margin-bottom:14px;
    }

    .btn{
      width:100%;
      border-radius:18px;
      padding:16px 16px;
      background: var(--btn);
      border:1px solid var(--btnStroke);
      color:#eaf4ff;
      font-size:26px;
      font-weight:800;
      letter-spacing:.3px;
      cursor:pointer;
      display:block;
    }

    .btn:active{
      transform: translateY(1px);
      filter: brightness(1.05);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel" id="panel">
      <div class="topRow">
        <div class="pill">Cooler Tap</div>
        <div class="pill">v0.1</div>
      </div>

      <div class="fanZone">
        <div class="fanOuter" id="fanOuter">
          <div class="fanRings"></div>

          <div class="fan" id="fan">
            <div class="tapLayer" id="tapLayer"></div>
            <div class="hub"></div>
            <div class="hub2"></div>
          </div>
        </div>
      </div>

      <div class="bottomCard">
        <div class="score" id="score">0000</div>
        <div class="hint">Тапай по кругу вентилятора ☝️</div>
        <button class="btn" type="button" id="claim">Забрать награды</button>
      </div>
    </div>
  </div>

  <script>
    // ✅ 1) Всегда старт с 0000
    let taps = 0;
    const scoreEl = document.getElementById('score');
    const tapLayer = document.getElementById('tapLayer');
    const fan = document.getElementById('fan');

    function renderScore(){
      scoreEl.textContent = String(taps).padStart(4, '0');
    }
    renderScore();

    // ✅ Вращение: idle 10s/круг, tap 1s/круг
    const IDLE_DUR = 10;   // сек
    const TAP_DUR  = 1;    // сек
    const BOOST_MS = 900;  // держим ускорение

    let boostTimer = null;

    function setSpin(seconds){
      fan.style.setProperty('--spinDur', seconds + 's');
    }
    setSpin(IDLE_DUR);

    function boostSpin(){
      setSpin(TAP_DUR);
      if (boostTimer) clearTimeout(boostTimer);
      boostTimer = setTimeout(() => setSpin(IDLE_DUR), BOOST_MS);
    }

    // ✅ Вибрация (в Telegram — лучше через HapticFeedback)
    function haptic(){
      try{
        if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){
          Telegram.WebApp.HapticFeedback.impactOccurred('light');
          return;
        }
      }catch(e){}
      if (navigator.vibrate) navigator.vibrate(15);
    }

    function onTap(){
      taps += 1;
      renderScore();
      boostSpin();
      haptic();
    }

    // pointer/touch
    tapLayer.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      onTap();
    }, {passive:false});

    // ✅ 2) убрать меню “копировать/выделить”
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('selectstart', (e) => e.preventDefault());

    // ✅ 3) убрать zoom/масштаб (iOS/Telegram WebView)
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, {passive:false});

    document.addEventListener('dblclick', (e) => e.preventDefault(), {passive:false});

    document.getElementById('claim').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Скоро добавим награды 🙂');
    });
  </script>
</body>
</html>
