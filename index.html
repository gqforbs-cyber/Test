<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Tether Tap</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      height:100%;margin:0;padding:0;overflow:hidden;
      user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
      touch-action:manipulation;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    }
    body{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 50% 85%, rgba(0,255,180,0.14), transparent 55%),
        linear-gradient(180deg, #0e1e4f 0%, #091638 60%, #050b22 100%);
    }
    .screen{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:48px;
    }
    .title{
      font-size:48px;
      font-weight:400;
      margin-bottom:34px;
      background: linear-gradient(90deg, #f7e6a3, #ffd86a, #f7e6a3);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow: 0 0 10px rgba(255,215,120,0.35), 0 0 25px rgba(255,215,120,0.22);
    }
    .coin{
      width:min(70vw, 340px);
      height:min(70vw, 340px);
      border-radius:28px;
      background-image:url("992437D4-0702-498F-9094-DB45594481F4.png");
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
      filter: drop-shadow(0 25px 60px rgba(0,255,180,0.35));
      outline:none;
    }
    .coin.pressed{ transform:scale(0.97); transition:transform .08s ease; }
    .counter{
      margin-top:44px;
      font-size:110px;
      font-weight:300;
      letter-spacing:12px;
      color:#7bffd7;
      text-shadow:0 0 18px rgba(0,255,200,0.45), 0 0 55px rgba(0,255,200,0.25);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="title">Tether Tap</div>
    <div id="coin" class="coin" aria-label="USDT"></div>
    <div id="counter" class="counter">0000</div>
  </div>

  <script>
    let taps = 0;
    const coin = document.getElementById("coin");
    const counter = document.getElementById("counter");

    function render(){ counter.textContent = String(taps).padStart(4,"0"); }
    function pressAnim(){
      coin.classList.add("pressed");
      setTimeout(()=>coin.classList.remove("pressed"),80);
    }
    function tap(){
      taps += 1;
      render();
      pressAnim();
    }

    coin.addEventListener("click", (e)=>{ e.preventDefault(); tap(); });

    coin.addEventListener("touchstart", (e)=>{
      e.preventDefault();
      tap();
    }, {passive:false});

    render();
  </script>
</body>
</html>
