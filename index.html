<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooler Tap</title>

<style>
:root{
  --img:url("./A185A1F2-89F8-4539-B7F4-24DB68B30DED.png");
  --speed:14s;
  --boost:1s;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#050814;
  font-family:Arial;
  overflow:hidden;
  user-select:none;
}

.stage{
  width:min(92vw,420px);
  aspect-ratio:768/1365;
  position:relative;
  transform:rotate(-18deg);
  cursor:pointer;
}

/* ФОН */
.base{
  position:absolute;
  inset:0;
  background-image:var(--img);
  background-size:cover;
  background-position:center;
  border-radius:18px;
  box-shadow:0 20px 80px rgba(0,0,0,.45);
}

/* КРУГ ВЕНТИЛЯТОРА */
.fan{
  position:absolute;
  width:44%;
  aspect-ratio:1/1;
  top:34%;
  left:28%;
  border-radius:50%;
  overflow:hidden;
  transform-origin:center;
  animation:spin var(--speed) linear infinite;
}

/* Картинка внутри круга */
.fan::before{
  content:"";
  position:absolute;
  inset:-100%;
  background-image:var(--img);
  background-size:cover;
  background-position:center;
}

.stage.boost .fan{
  animation-duration:var(--boost);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* Счетчик */
.counter{
  margin-top:20px;
  font-size:72px;
  font-weight:700;
  letter-spacing:8px;
  color:#4CFF7A;
  text-shadow:0 0 25px rgba(76,255,122,.4);
  font-variant-numeric:tabular-nums;
}
</style>
</head>

<body>

<div id="stage" class="stage">
  <div class="base"></div>
  <div class="fan"></div>
</div>

<div id="count" class="counter">0000</div>

<script>
const stage=document.getElementById("stage");
const counter=document.getElementById("count");

let count=0;
let timeout;

function pad(n){
  return String(n).padStart(4,"0");
}

function tap(){
  count++;
  counter.textContent=pad(count);

  stage.classList.add("boost");
  clearTimeout(timeout);
  timeout=setTimeout(()=>{
    stage.classList.remove("boost");
  },200);
}

stage.addEventListener("click",tap);
stage.addEventListener("touchstart",e=>{
  e.preventDefault();
  tap();
},{passive:false});
</script>

</body>
</html>
